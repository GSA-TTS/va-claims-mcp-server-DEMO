---
applications:
  - name: va-claims-mcp-server
    buildpacks:
      - python_buildpack
    memory: 512M
    disk_quota: 1G
    instances: 1

    # FastMCP HTTP server - uses PORT env var from cloud.gov
    command: PYTHONPATH=src uvicorn src.va_claims.server:app --host 0.0.0.0 --port $PORT

    # Public route for MCP clients (auth handled by the server via VA OAuth)
    routes:
      - route: va-claims-mcp.app.cloud.gov

    # Health check
    health-check-type: http
    health-check-http-endpoint: /health

    env:
      # Python settings
      PYTHONUNBUFFERED: "1"

      # Use sandbox by default (set to "false" for production)
      USE_SANDBOX: "true"

      # Authentication via VA OAuth
      # Set these via `cf set-env` for security:
      #   cf set-env va-claims-mcp-server BASE_URL https://va-claims-mcp.app.cloud.gov
      #   cf set-env va-claims-mcp-server VA_CLIENT_ID <your-client-id>
      #   cf set-env va-claims-mcp-server VA_CLIENT_SECRET <your-client-secret>
